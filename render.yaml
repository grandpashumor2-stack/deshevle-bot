services:
  - type: worker
    name: deshevle-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: DB_PATH
        value: /data/bot.db
    disk:
      name: bot-data
      mountPath: /data
      sizeGB: 1
